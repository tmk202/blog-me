<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Desert War God - Low Poly Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #label {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e1ac6b;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="label">
        <h1>DESERT WAR GOD</h1>
        <p>Model: Low Poly Warrior</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- KHỞI TẠO SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c1e14);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        // --- VẬT LIỆU LOW POLY ---
        const skinMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63, flatShading: true }); // Da nâu sa mạc
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2, flatShading: true }); // Giáp vàng
        const clothMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, flatShading: true }); // Vải choàng

        const godGroup = new THREE.Group();

        // 1. Thân mình (Torso) - Hình thang ngược
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.4, 1.5, 6), skinMat);
        torso.position.y = 2.5;
        godGroup.add(torso);

        // 2. Đầu (Head) & Mũ giáp (Helmet)
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
        head.position.y = 3.6;
        godGroup.add(head);

        const helmet = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.8, 4), goldMat);
        helmet.position.y = 4.1;
        godGroup.add(helmet);

        // Tai chó sói (Anubis style)
        const earGeo = new THREE.BoxGeometry(0.1, 0.6, 0.2);
        const leftEar = new THREE.Mesh(earGeo, goldMat);
        leftEar.position.set(-0.2, 4, 0);
        leftEar.rotation.z = 0.2;
        godGroup.add(leftEar);
        
        const rightEar = leftEar.clone();
        rightEar.position.x = 0.2;
        rightEar.rotation.z = -0.2;
        godGroup.add(rightEar);

        // 3. Tay (Arms)
        const armGeo = new THREE.CylinderGeometry(0.15, 0.1, 1.2, 4);
        const leftArm = new THREE.Mesh(armGeo, skinMat);
        leftArm.position.set(-0.8, 2.8, 0);
        leftArm.rotation.z = 0.5;
        godGroup.add(leftArm);

        const rightArm = new THREE.Mesh(armGeo, skinMat);
        rightArm.position.set(0.8, 2.8, 0.5);
        rightArm.rotation.x = -1; // Tay đưa về phía trước cầm vũ khí
        godGroup.add(rightArm);

        // 4. Chân (Legs)
        const legGeo = new THREE.CylinderGeometry(0.2, 0.15, 1.8, 4);
        const leftLeg = new THREE.Mesh(legGeo, skinMat);
        leftLeg.position.set(-0.3, 1, 0);
        godGroup.add(leftLeg);

        const rightLeg = leftLeg.clone();
        rightLeg.position.x = 0.3;
        godGroup.add(rightLeg);

        // 5. Vũ khí: Quyền trượng/Thương (Spear)
        const spearGroup = new THREE.Group();
        const staff = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 5, 4), clothMat);
        const tip = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.8, 4), goldMat);
        tip.position.y = 2.5;
        spearGroup.add(staff, tip);
        spearGroup.position.set(1.2, 2.5, 1);
        spearGroup.rotation.x = 0.2;
        godGroup.add(spearGroup);

        // 6. Khăn choàng (Cape/Cloth)
        const cape = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2.5), clothMat);
        cape.position.set(0, 2.5, -0.4);
        cape.rotation.x = 0.1;
        cape.material.side = THREE.DoubleSide;
        godGroup.add(cape);

        scene.add(godGroup);

        // --- ÁNH SÁNG ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const spotLight = new THREE.SpotLight(0xffaa00, 50);
        spotLight.position.set(5, 10, 5);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // Nền đất sa mạc
        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(10, 32),
            new THREE.MeshStandardMaterial({ color: 0x3d2b1f })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- VÒNG LẶP ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Hiệu ứng thở nhẹ (thần đứng yên nhưng vẫn sống động)
            godGroup.position.y = Math.sin(Date.now() * 0.002) * 0.05;
            
            // Xoay vũ khí nhẹ nhàng
            spearGroup.rotation.z = Math.sin(Date.now() * 0.001) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
