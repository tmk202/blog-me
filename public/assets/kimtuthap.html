<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Golden Pyramid - Rich Texture Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; } /* Nền trắng */
        #label {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #b8860b; /* Màu vàng đồng tối */
            font-family: 'Georgia', serif;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="label">
        <h1>KIM TỰ THÁP VÀNG RỰC</h1>
        <p>Mô phỏng thực tế với tông màu vàng đậm và PBR Texturing</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- KHỞI TẠO SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // Nền màu trắng

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 18); // Góc nhìn đẹp để thấy chi tiết và màu sắc

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Bật đổ bóng
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Đổ bóng mềm
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Độ mượt khi xoay

        // --- TẠO TEXTURE GIẢ LẬP (PROCEDURAL PBR MAPS WITH RICHER YELLOW) ---
        const textureSize = 512;

        // 1. Map Màu (Diffuse Map): Tông màu vàng đậm rực rỡ
        const createDiffuseMap = () => {
            const canvas = document.createElement('canvas');
            canvas.width = textureSize; canvas.height = textureSize;
            const ctx = canvas.getContext('2d');
            
            // Màu nền vàng đậm (vàng nghệ/vàng găm)
            ctx.fillStyle = '#daa520'; 
            ctx.fillRect(0, 0, textureSize, textureSize);
            
            // Thêm vết bẩn, đốm màu tông vàng/nâu ngẫu nhiên
            for(let i=0; i<2000; i++) {
                const x = Math.random() * textureSize;
                const y = Math.random() * textureSize;
                const size = Math.random() * 5 + 1;
                // Kết hợp các tông màu vàng đậm, nâu vàng, vàng chanh nhạt
                const colors = ['#b8860b', '#cd853f', '#f0e68c', '#bdb76b'];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.globalAlpha = Math.random() * 0.4; // Độ trong suốt ngẫu nhiên
                ctx.fillRect(x, y, size, size);
            }
            return new THREE.CanvasTexture(canvas);
        };

        // 2. Map Độ Nhám (Roughness Map): Giữ nguyên độ sần sùi
        const createRoughnessMap = () => {
            const canvas = document.createElement('canvas');
            canvas.width = textureSize; canvas.height = textureSize;
            const ctx = canvas.getContext('2d');
            
            // Nền xám đậm (Roughness cao)
            ctx.fillStyle = '#888888'; 
            ctx.fillRect(0, 0, textureSize, textureSize);
            
            // Thêm đốm nhiễu
            ctx.globalCompositeOperation = 'lighter';
            for(let i=0; i<5000; i++) {
                const x = Math.random() * textureSize;
                const y = Math.random() * textureSize;
                const size = Math.random() * 2 + 0.5;
                const gray = Math.floor(Math.random() * 255);
                ctx.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
                ctx.fillRect(x, y, size, size);
            }
            return new THREE.CanvasTexture(canvas);
        };

        // 3. Map Pháp Tuyến (Normal Map): Giữ nguyên độ sần sùi micro
        const createNormalMap = () => {
            const canvas = document.createElement('canvas');
            canvas.width = textureSize; canvas.height = textureSize;
            const ctx = canvas.getContext('2d');
            
            // Nền tím/xanh chuẩn
            ctx.fillStyle = '#8080ff'; 
            ctx.fillRect(0, 0, textureSize, textureSize);
            
            // Thêm nhiễu ngẫu nhiên
            for(let i=0; i<textureSize * textureSize; i++) {
                const x = Math.random() * textureSize;
                const y = Math.random() * textureSize;
                const r = 128 + (Math.random() - 0.5) * 30;
                const g = 128 + (Math.random() - 0.5) * 30;
                const b = 255; 
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fillRect(x, y, 1, 1);
            }
            return new THREE.CanvasTexture(canvas);
        };

        // --- TẠO KIM TỰ THÁP VÀNG RỰC (GOLDEN PYRAMID) ---
        const pyramidGeo = new THREE.ConeGeometry(8, 12, 4);
        
        const diffuseMap = createDiffuseMap();
        diffuseMap.wrapS = diffuseMap.wrapT = THREE.RepeatWrapping;
        diffuseMap.repeat.set(2, 2);

        const roughnessMap = createRoughnessMap();
        roughnessMap.wrapS = roughnessMap.wrapT = THREE.RepeatWrapping;
        roughnessMap.repeat.set(2, 2);

        const normalMap = createNormalMap();
        normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;
        normalMap.repeat.set(2, 2);

        const pyramidMat = new THREE.MeshStandardMaterial({ 
            map: diffuseMap, // Map màu vàng đậm
            roughnessMap: roughnessMap,
            normalMap: normalMap,
            normalScale: new THREE.Vector2(1.5, 1.5), // Độ sần sùi rõ
            metalness: 0.1, // Thêm một chút ánh kim loại nhẹ
            roughness: 0.9 // Vẫn giữ độ nhám cao
        });

        const pyramid = new THREE.Mesh(pyramidGeo, pyramidMat);
        pyramid.position.y = 6;
        pyramid.castShadow = true;
        pyramid.receiveShadow = true;
        scene.add(pyramid);

        // --- ÁNH SÁNG VÀNG ẤM (WARM LIGHTING TO ENHANCE GOLD) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.2); // Ánh sáng nền rất yếu
        scene.add(ambient);

        // Ánh sáng Directional tông vàng ấm, cường độ cao
        const sunLight = new THREE.DirectionalLight(0xffd700, 2.0); // Màu vàng gold, cường độ mạnh
        sunLight.position.set(10, 15, 10); // Góc chiếu đẹp
        sunLight.castShadow = true;
        
        // Cấu hình đổ bóng chi tiết
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        sunLight.shadow.bias = -0.001;
        scene.add(sunLight);

        // Nền đất đơn giản để đổ bóng
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0xeeeeee })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- VÒNG LẶP ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Cập nhật OrbitControls
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
