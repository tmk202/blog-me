<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Wild West Saloon Low Poly</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #332211; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd2b48c); // Màu cát sa mạc
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        // --- VẬT LIỆU ---
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, flatShading: true }); // Gỗ đậm
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63 }); // Gỗ sàn
        const signMat = new THREE.MeshStandardMaterial({ color: 0xefebe9 }); // Bảng hiệu

        // --- XÂY DỰNG ---

        // 1. Tường chính (Main Structure)
        const mainWall = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 4), woodMat);
        mainWall.position.y = 3;
        mainWall.castShadow = true;
        scene.add(mainWall);

        // 2. Bảng hiệu cao (False Front)
        const falseFront = new THREE.Mesh(new THREE.BoxGeometry(8.2, 2, 0.5), woodMat);
        falseFront.position.set(0, 7, 2);
        scene.add(falseFront);

        // 3. Mái hiên (Porch Roof)
        const porchRoof = new THREE.Mesh(new THREE.BoxGeometry(8.5, 0.2, 3), woodMat);
        porchRoof.position.set(0, 4.5, 3.5);
        porchRoof.rotation.x = 0.1; // Hơi dốc ra ngoài
        scene.add(porchRoof);

        // 4. Sàn gỗ phía trước (Porch Floor)
        const porchFloor = new THREE.Mesh(new THREE.BoxGeometry(8.5, 0.3, 3), floorMat);
        porchFloor.position.set(0, 0.15, 3.5);
        porchFloor.receiveShadow = true;
        scene.add(porchFloor);

        // 5. Các cột trụ (Pillars)
        const pillarGeo = new THREE.BoxGeometry(0.2, 4.5, 0.2);
        const p1 = new THREE.Mesh(pillarGeo, woodMat); p1.position.set(-3.8, 2.25, 4.8); scene.add(p1);
        const p2 = new THREE.Mesh(pillarGeo, woodMat); p2.position.set(3.8, 2.25, 4.8); scene.add(p2);
        const p3 = new THREE.Mesh(pillarGeo, woodMat); p3.position.set(0, 2.25, 4.8); scene.add(p3);

        // 6. Cửa đung đưa (Batwing Doors)
        const doorGroup = new THREE.Group();
        const doorGeo = new THREE.BoxGeometry(1.2, 1.8, 0.1);
        const leftDoor = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({color: 0x3e2723}));
        leftDoor.position.set(-0.65, 0, 0);
        
        const rightDoor = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({color: 0x3e2723}));
        rightDoor.position.set(0.65, 0, 0);

        doorGroup.add(leftDoor, rightDoor);
        doorGroup.position.set(0, 1.5, 2.1); // Đặt ở mặt trước tường
        scene.add(doorGroup);

        // 7. Lan can (Railings)
        const railGeo = new THREE.BoxGeometry(3.5, 0.1, 0.1);
        const r1 = new THREE.Mesh(railGeo, woodMat); r1.position.set(-2, 1, 4.8); scene.add(r1);
        const r2 = new THREE.Mesh(railGeo, woodMat); r2.position.set(2, 1, 4.8); scene.add(r2);

        // --- ÁNH SÁNG ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffccaa, 1.2);
        sun.position.set(10, 15, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Nền đất sa mạc
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({color: 0xc2a47d}));
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        function animate() {
            requestAnimationFrame(animate);
            // Hiệu ứng cửa đung đưa nhẹ
            doorGroup.rotation.y = Math.sin(Date.now() * 0.002) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
